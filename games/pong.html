<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a; /* Dark background for the page */
            font-family: 'Arial', sans-serif;
            color: #fff;
        }
        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid #00ff00; /* Green border for the game area */
            border-radius: 10px;
            padding: 20px;
            background-color: #0d0d0d; /* Slightly lighter dark for game container */
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        canvas {
            background-color: #000; /* Black background for the canvas */
            display: block;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            touch-action: none; /* let JS handle vertical drags instead of scrolling */
        }
        #controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        #startButton {
            padding: 12px 25px;
            font-size: 18px;
            color: #000;
            background-color: #00ff00; /* Bright green */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
        #startButton:hover {
            background-color: #00cc00; /* Darker green on hover */
        }
        #startButton:active {
            transform: scale(0.95);
        }
        #score {
            font-size: 24px;
            color: #00ff00; /* Green score text */
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.7);
        }
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            padding: 20px 30px;
            border-radius: 10px;
            font-size: 28px;
            text-align: center;
            display: none; /* Hidden by default */
            z-index: 10;
            border: 1px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="pongCanvas"></canvas>
        <div id="controls">
            <button id="startButton">Start Game</button>
            <div id="score">Player: 0 - AI: 0</div>
        </div>
    </div>
    <div id="messageBox">Game Over!</div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const context = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');
        const scoreDisplay = document.getElementById('score');
        const messageBox = document.getElementById('messageBox');

        // Game constants
        const PADDLE_HEIGHT = 100;
        const PADDLE_WIDTH = 15;
        const BALL_RADIUS = 8;
        const WINNING_SCORE = 5;

        let gameRunning = false;
        let animationFrameId;

        // Game objects
        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5, // Delta x (horizontal speed)
            dy: 5, // Delta y (vertical speed)
            radius: BALL_RADIUS
        };

        let player = {
            x: 10,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            score: 0
        };

        let ai = {
            x: canvas.width - PADDLE_WIDTH - 10,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            score: 0,
            speed: 3.5 // AI paddle speed
        };

        // Set canvas dimensions
        // Making canvas responsive to a degree, but fixed aspect ratio for gameplay
        function resizeCanvas() {
            const maxWidth = 800;
            const maxHeight = 500;
            const windowWidth = window.innerWidth * 0.8;
            const windowHeight = window.innerHeight * 0.7;

            let newWidth = Math.min(maxWidth, windowWidth);
            let newHeight = newWidth * (maxHeight / maxWidth); // Maintain aspect ratio

            if (newHeight > windowHeight) {
                newHeight = Math.min(maxHeight, windowHeight);
                newWidth = newHeight * (maxWidth / maxHeight);
            }
            
            canvas.width = newWidth;
            canvas.height = newHeight;

            // Recalculate positions if game is not running or after resize
            if (!gameRunning) {
                resetBall(1); // Reset ball to center, initial direction to player
                player.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
                ai.x = canvas.width - PADDLE_WIDTH - 10;
                ai.y = canvas.height / 2 - PADDLE_HEIGHT / 2;
            }
        }


        // --- Drawing functions ---
        function drawRect(x, y, w, h, color) {
            context.fillStyle = color;
            context.fillRect(x, y, w, h);
        }

        function drawCircle(x, y, r, color) {
            context.fillStyle = color;
            context.beginPath();
            context.arc(x, y, r, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();
        }

        function drawNet() {
            for (let i = 0; i <= canvas.height; i += 15) {
                drawRect(canvas.width / 2 - 1, i, 2, 10, '#00ff00'); // Green net
            }
        }

        function drawGame() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, '#000'); // Black background

            // Draw net
            drawNet();

            // Draw paddles
            drawRect(player.x, player.y, player.width, player.height, '#00ff00'); // Green player paddle
            drawRect(ai.x, ai.y, ai.width, ai.height, '#00ff00');    // Green AI paddle

            // Draw ball
            drawCircle(ball.x, ball.y, ball.radius, '#00ff00'); // Green ball
        }

        // --- Update functions ---
        function updateScore() {
            scoreDisplay.textContent = `Player: ${player.score} - AI: ${ai.score}`;
        }

        function resetBall(direction) { // direction is 1 for player, -1 for AI
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            
            // Ensure consistent speed magnitude, vary angle slightly
            let angle = Math.random() * Math.PI / 4 - Math.PI / 8; // -22.5 to 22.5 degrees
            ball.dx = direction * 5 * Math.cos(angle);
            ball.dy = 5 * Math.sin(angle) || (Math.random() > 0.5 ? 2 : -2); // Ensure it's not 0, add slight vertical if angle is 0
        }

        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision (top/bottom)
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy *= -1;
                 // Play a bounce sound (conceptual, Tone.js would be needed for actual sound)
            }

            // Paddle collision
            // Player paddle
            if (ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y && ball.y < player.y + player.height &&
                ball.dx < 0) { // Check if ball is moving towards player
                
                // Calculate hit position on paddle (-1 to 1)
                let collidePoint = (ball.y - (player.y + player.height / 2)) / (player.height / 2);
                // Angle of reflection (max 45 degrees)
                let angleRad = (Math.PI / 4) * collidePoint;
                
                // Change ball direction
                ball.dx = 5 * Math.cos(angleRad); // Speed magnitude 5
                ball.dy = 5 * Math.sin(angleRad);
                // Play a paddle hit sound
            }

            // AI paddle
            if (ball.x + ball.radius > ai.x &&
                ball.y > ai.y && ball.y < ai.y + ai.height &&
                ball.dx > 0) { // Check if ball is moving towards AI
                
                let collidePoint = (ball.y - (ai.y + ai.height / 2)) / (ai.height / 2);
                let angleRad = (Math.PI / 4) * collidePoint;

                ball.dx = -5 * Math.cos(angleRad); // Speed magnitude 5, opposite direction
                ball.dy = 5 * Math.sin(angleRad);
                 // Play a paddle hit sound
            }


            // Score points
            if (ball.x - ball.radius < 0) { // AI scores
                ai.score++;
                updateScore();
                checkWin();
                if (gameRunning) resetBall(1); // Ball goes to player
            } else if (ball.x + ball.radius > canvas.width) { // Player scores
                player.score++;
                updateScore();
                checkWin();
                if (gameRunning) resetBall(-1); // Ball goes to AI
            }
        }

        function movePlayerPaddle(event) {
            // Support both mouse and touch input
            let clientY;
            if (event.touches && event.touches.length) {
                event.preventDefault(); // stop the page from scrolling while dragging
                clientY = event.touches[0].clientY;
            } else {
                clientY = event.clientY;
            }

            let rect = canvas.getBoundingClientRect();
            // Account for any CSS scaling between display size and canvas resolution
            let scaleY = canvas.height / rect.height;
            player.y = (clientY - rect.top) * scaleY - player.height / 2;

            // Keep paddle within canvas bounds
            if (player.y < 0) {
                player.y = 0;
            } else if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
            }
        }

        function moveAiPaddle() {
            // Simple AI: tries to center its paddle on the ball's y position
            const paddleCenter = ai.y + ai.height / 2;
            
            if (paddleCenter < ball.y - 20) { // Ball is significantly below paddle center
                ai.y += ai.speed;
            } else if (paddleCenter > ball.y + 20) { // Ball is significantly above paddle center
                ai.y -= ai.speed;
            }

            // Keep AI paddle within canvas bounds
            if (ai.y < 0) {
                ai.y = 0;
            } else if (ai.y + ai.height > canvas.height) {
                ai.y = canvas.height - ai.height;
            }
        }

        // --- Game loop ---
        // Fixed-timestep loop: run game logic a fixed 60 times/sec regardless of
        // the monitor's refresh rate, so the game plays at the same speed on any
        // display. Rendering still happens once per animation frame.
        const FIXED_DT = 1000 / 60; // ms per logic step (~16.67ms = 60 updates/sec)
        let lastTime = null;
        let accumulator = 0;

        function gameLoop(now) {
            if (!gameRunning) return;

            if (lastTime === null) lastTime = now;
            let frameTime = now - lastTime;
            lastTime = now;

            // Clamp to avoid a "spiral of death" after the tab is backgrounded
            if (frameTime > 250) frameTime = 250;
            accumulator += frameTime;

            while (accumulator >= FIXED_DT) {
                moveBall();
                moveAiPaddle();
                accumulator -= FIXED_DT;
            }

            drawGame();

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function checkWin() {
            if (player.score >= WINNING_SCORE) {
                showEndGameMessage("Player Wins!");
            } else if (ai.score >= WINNING_SCORE) {
                showEndGameMessage("AI Wins!");
            }
        }

        function showEndGameMessage(message) {
            gameRunning = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            messageBox.textContent = message;
            messageBox.style.display = 'block';
            startButton.textContent = 'Play Again?';
            startButton.style.backgroundColor = '#ffc107'; // Yellow for play again
            startButton.style.color = '#000';
        }
        
        function startGame() {
            if (gameRunning && (player.score >= WINNING_SCORE || ai.score >= WINNING_SCORE)) {
                // If game was over, reset scores for "Play Again"
                player.score = 0;
                ai.score = 0;
                updateScore();
            } else if (gameRunning) {
                // If game is already running and not over, don't restart (or could pause/resume)
                return;
            }


            gameRunning = true;
            messageBox.style.display = 'none';
            startButton.textContent = 'Game On!';
            startButton.style.backgroundColor = '#dc3545'; // Reddish when game is on, to indicate it's active
            startButton.style.color = '#fff';

            // Reset scores if it's a fresh start after a win
            if (player.score >= WINNING_SCORE || ai.score >= WINNING_SCORE) {
                 player.score = 0;
                 ai.score = 0;
                 updateScore();
            }
            
            resizeCanvas(); // Ensure canvas is sized correctly before starting
            resetBall(Math.random() < 0.5 ? 1 : -1); // Random initial direction
            
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            // Reset timestep state so a fresh game doesn't inherit a stale
            // timestamp and run one large catch-up burst on the first frame.
            lastTime = null;
            accumulator = 0;
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // Event listeners
        canvas.addEventListener('mousemove', movePlayerPaddle);
        canvas.addEventListener('touchstart', movePlayerPaddle, { passive: false });
        canvas.addEventListener('touchmove', movePlayerPaddle, { passive: false });
        startButton.addEventListener('click', startGame);
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (!gameRunning) { // Redraw initial state if game hasn't started
                 drawGame();
            }
        });

        // Initial setup
        resizeCanvas(); // Size canvas on load
        drawGame(); // Draw initial state (paddles, net)
        updateScore(); // Initialize score display

        console.log("Pong game initialized. Press Start Game to play!");
    </script>
</body>
</html>
